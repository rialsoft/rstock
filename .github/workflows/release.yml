name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux/amd64
            output: rstock-linux-amd64
          - os: windows-latest
            platform: windows/amd64
            output: rstock-windows-amd64.exe
          - os: macos-13
            platform: darwin/amd64
            output: rstock-darwin-amd64
          - os: macos-latest
            platform: darwin/arm64
            output: rstock-darwin-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version
        run: |
          # Strip 'v' prefix for filenames
          echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV
          echo "VERSION_TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true
          cache-dependency-path: go.sum

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.10.2

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.0-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Build Wails app (${{ matrix.platform }})
        if: runner.os != 'Windows'
        run: |
          CGO_ENABLED=1 wails build \
            -platform ${{ matrix.platform }} \
            -o ${{ matrix.output }} \
            -clean

      - name: Build Wails app (${{ matrix.platform }})
        if: runner.os == 'Windows'
        run: |
          CGO_ENABLED=1 wails build \
            -platform ${{ matrix.platform }} \
            -o ${{ matrix.output }} \
            -webview2 embed \
            -nsis \
            -clean

      - name: Verify binary exists
        run: |
          echo "Searching for build output..."
          ls -la build/bin/ 2>/dev/null || true
          # macOS: Wails produces rstock.app regardless of -o flag
          if [ -d "build/bin/rstock.app" ]; then
            mv "build/bin/rstock.app" "build/bin/${{ matrix.output }}.app"
            echo "Renamed rstock.app → ${{ matrix.output }}.app"
          fi
          if [ -f "build/bin/${{ matrix.output }}" ]; then
            echo "Binary found: build/bin/${{ matrix.output }}"
          elif [ -d "build/bin/${{ matrix.output }}.app" ]; then
            echo "Bundle found: build/bin/${{ matrix.output }}.app"
          else
            echo "ERROR: No binary or bundle found at expected path"
            find build/bin -maxdepth 3 -ls 2>/dev/null
            exit 1
          fi

      - name: Zip macOS bundle
        if: runner.os == 'macOS'
        run: |
          if [ -d "build/bin/${{ matrix.output }}.app" ]; then
            cd build/bin
            zip -r "${{ matrix.output }}.app.zip" "${{ matrix.output }}.app"
            cd ../..
            echo "Created build/bin/${{ matrix.output }}.app.zip"
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: |
            build/bin/${{ matrix.output }}
            build/bin/${{ matrix.output }}.app
            build/bin/${{ matrix.output }}.app.zip
          retention-days: 7

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version
        run: |
          echo "VERSION_TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
          echo "VERSION_STR=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: rstock-*
          merge-multiple: false

      - name: Flatten artifact directory
        run: |
          mkdir -p release
          find release-assets -type f \( -name 'rstock' -o -name 'rstock-*' -o -name '*.zip' \) -exec cp {} release/ \;
          echo "Release assets:"
          ls -lh release/

      - name: Extract changelog for this version
        run: |
          VERSION="${{ env.VERSION_STR }}"
          echo "Extracting changelog for version $VERSION..."

          # Extract section between ## [VERSION] and next ## [...]
          awk -v ver="$VERSION" '
            BEGIN { found=0; }
            $0 ~ "^## \\["ver"\\]" { found=1; next; }
            found && $0 ~ "^## \\[" { exit; }
            found { print; }
          ' CHANGELOG.md > changelog-extract.md

          echo "--- Extracted changelog ---"
          cat changelog-extract.md

      - name: Generate release notes
        run: |
          cat > release-notes.md << 'ENDOFFILE'
          ## rstock ${{ env.VERSION_TAG }}

          ### Download

          | Platform | File |
          |----------|------|
          | Linux (amd64) | `rstock-linux-amd64` |
          | Windows (amd64) | `rstock-windows-amd64.exe` |
          | macOS (Intel) | `rstock-darwin-amd64` or `rstock-darwin-amd64.app.zip` |
          | macOS (Apple Silicon) | `rstock-darwin-arm64` or `rstock-darwin-arm64.app.zip` |

          ### Requirements
          - **Linux:** libgtk-3, libwebkit2gtk-4.1
          - **Windows:** WebView2 runtime (included in Windows 10/11)
          - **macOS:** macOS 11+

          ---
          ENDOFFILE

          # Append extracted changelog
          if [ -s changelog-extract.md ]; then
            cat changelog-extract.md >> release-notes.md
          else
            echo "> _No changelog entry found for ${{ env.VERSION_TAG }}_" >> release-notes.md
          fi

          echo "---" >> release-notes.md
          echo "" >> release-notes.md
          echo "Generated automatically by GitHub Actions." >> release-notes.md

          echo "--- Final release notes ---"
          cat release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: ${{ env.VERSION_TAG }}
          tag_name: ${{ env.VERSION_TAG }}
          body_path: release-notes.md
          files: release/*
          draft: true
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
